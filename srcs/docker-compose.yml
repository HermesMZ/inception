services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      - db_root_password
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$(cat /run/secrets/db_root_password) --skip-ssl"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
      
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    environment:
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_HOST: mariadb
      DOMAIN_NAME: ${DOMAIN_NAME}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE}
      WORDPRESS_USER: ${WORDPRESS_USER}
      WORDPRESS_USER_EMAIL: ${WORDPRESS_USER_EMAIL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORDPRESS_AUTH_KEY_FILE: /run/secrets/wordpress_auth_key
      WORDPRESS_SECURE_AUTH_KEY_FILE: /run/secrets/wordpress_secure_auth_key
      WORDPRESS_LOGGED_IN_KEY_FILE: /run/secrets/wordpress_logged_in_key
      WORDPRESS_NONCE_KEY_FILE: /run/secrets/wordpress_nonce_key
      WORDPRESS_AUTH_SALT_FILE: /run/secrets/wordpress_auth_salt
      WORDPRESS_SECURE_AUTH_SALT_FILE: /run/secrets/wordpress_secure_auth_salt
      WORDPRESS_LOGGED_IN_SALT_FILE: /run/secrets/wordpress_logged_in_salt
      WORDPRESS_NONCE_SALT_FILE: /run/secrets/wordpress_nonce_salt
      WORDPRESS_ADMIN_PASSWORD_FILE: /run/secrets/wordpress_admin_password
      WORDPRESS_USER_PASSWORD_FILE: /run/secrets/wordpress_user_password
      DB_PASSWORD_FILE: /run/secrets/db_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets:
      - wordpress_auth_key
      - wordpress_secure_auth_key
      - wordpress_logged_in_key
      - wordpress_nonce_key
      - wordpress_auth_salt
      - wordpress_secure_auth_salt
      - wordpress_logged_in_salt
      - wordpress_nonce_salt
      - wordpress_admin_password
      - wordpress_user_password
      - db_password
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "wp core is-installed --path=/var/www/html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      wordpress:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --spider --quiet https://${DOMAIN_NAME}:443 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    build: ./bonus/redis
    image: redis
    container_name: redis
    restart: always
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets:
      - redis_password
    networks:
      - inception
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping | grep PONG"]      
      interval: 5s
      timeout: 3s
      retries: 3

  ftp:
    build: ./bonus/ftp
    image: ftp
    container_name: ftp
    restart: always
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    environment:
      FTP_PASSWORD_FILE: /run/secrets/ftp_password
      DOMAIN_NAME: ${DOMAIN_NAME}
    secrets:
      - ftp_password
    volumes:
      - wordpress_data:/home/ftpuser/wordpress
    networks:
      - inception
    depends_on:
      wordpress:
        condition: service_healthy

  adminer:
    build: ./bonus/adminer
    image: adminer
    container_name: adminer
    restart: always
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 20s
      timeout: 5s
      retries: 3

  portainer:
    build: ./bonus/portainer
    image: portainer
    container_name: portainer
    restart: always
    environment:
      PORTAINER_PASSWORD_FILE: /run/secrets/portainer_password
    secrets:
      - portainer_password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - inception
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    container_name: dashboard
    build: ./bonus/dashboard
    networks:
      - inception
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress

  portainer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/portainer

networks:
  inception:
    name: inception
    driver: bridge

secrets:
  portainer_password:
    file: ./secrets/portainer_password.txt
  ftp_password:
    file: ./secrets/ftp_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  wordpress_auth_key:
    file: ./secrets/wp_auth_key.txt
  wordpress_secure_auth_key:
    file: ./secrets/wp_secure_auth_key.txt
  wordpress_logged_in_key:
    file: ./secrets/wp_logged_in_key.txt
  wordpress_nonce_key:
    file: ./secrets/wp_nonce_key.txt
  wordpress_auth_salt:
    file: ./secrets/wp_auth_salt.txt
  wordpress_secure_auth_salt:
    file: ./secrets/wp_secure_auth_salt.txt
  wordpress_logged_in_salt:
    file: ./secrets/wp_logged_in_salt.txt
  wordpress_nonce_salt:
    file: ./secrets/wp_nonce_salt.txt
  wordpress_admin_password:
    file: ./secrets/wp_admin_password.txt
  wordpress_user_password:
    file: ./secrets/wp_user_password.txt
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt