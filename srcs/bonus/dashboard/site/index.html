<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inception Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-decoration: none; color: #38bdf8; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
        h1 { margin-top: 50px; color: #f1f5f9; }
        .status { font-size: 0.8em; color: #4ade80; }
    </style>
</head>
<body>
    <h1>System Dashboard</h1>
    <div class="grid">
        <a href="/" class="card"><h3>WordPress</h3><p class="status">● Online (HTTPS)</p></a>
        <a href="/wp-admin" class="card"><h3>WordPress Admin</h3><p class="status">● Online (HTTPS)</p></a>
        <a href="/adminer" class="card"><h3>Adminer</h3><p class="status">● Database Tool</p></a>
        <a href="/portainer" class="card"><h3>Portainer</h3><p class="status" style="color:#fbbf24">● Container Management</p></a>
    </div>
</body>
</html>
