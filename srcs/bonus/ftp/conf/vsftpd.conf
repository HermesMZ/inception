listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
dirmessage_enable=YES

chroot_local_user=YES
allow_writeable_chroot=YES
seccomp_sandbox=NO

user_sub_token=$USER

pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010
pasv_address=127.0.0.1

# Permissions d'écriture
file_open_mode=0777
local_umask=022

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES
dual_log_enable=YES

# Performance
listen_port=21
connect_from_port_20=YES

# Logging DÉTAILLÉ
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES
dual_log_enable=YES
debug_ssl=YES
syslog_enable=YES